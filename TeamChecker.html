<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intramurals Eligibility Checker</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- PyScript (same style as your sample) -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
    body {
  background-color: #f8fafc;
  transition: background-color 0.8s ease;
  min-height: 100vh;
}

/* smooth button color change */
#checkBtn {
  transition: background-color 0.6s ease, border-color 0.6s ease, color 0.6s ease;
}

      
      .title-badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: #111827;
        color: white;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
      }
      .card {
        border: 0;
        border-radius: 16px;
      }
      .card-header {
        border: 0;
        background: transparent;
        padding-bottom: 0;
      }
      .form-control,
      .form-select {
        border-radius: 12px;
        padding: 10px 12px;
      }
      .btn-primary {
        border-radius: 12px;
        padding: 12px;
        font-weight: 700;
      }
      #result {
        white-space: pre-line; /* shows \n nicely */
        border-radius: 14px;
        padding: 14px;
        border: 1px solid #e5e7eb;
        background: #ffffff;
      }
    
    </style>
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7 col-xl-6">
          <div class="card shadow-lg">
            <div class="card-header pt-4 px-4">
              <span class="title-badge">INTRAMURALS</span>
              <h1 class="h3 mt-3 mb-1 fw-bold">Eligibility Checker</h1>
              <p class="text-muted mb-0">
                Check if you can join and see your team assignment.
              </p>
            </div>

            <div class="card-body p-4">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold">
                    Confirmation of Intramurals online registration
                  </label>
                  <select id="registered" class="form-select">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label fw-semibold">
                    Confirmation of medical clearance
                  </label>
                  <select id="medical" class="form-select">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                  </select>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold">Grade level (7–10 only)</label>
                  <input
                    type="text"
                    id="grade"
                    class="form-control"
                    placeholder="e.g., 10"
                  />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold">Section</label>
                  <input
                    type="text"
                    id="section"
                    class="form-control"
                    placeholder="e.g., 10-Ruby"
                  />
                </div>

                <div class="col-12 mt-2">
                  <button id="checkBtn" class="btn btn-primary w-100" py-click="check_student">
  Check Eligibility
</button>

                </div>

                <div class="col-12">
                  <div id="result" class="mt-2">
                  </div>
                </div>

                <div class="col-12">
                  <div class="footer mt-2">
                    Rules: must be registered online, must have medical clearance, grades 7–10 only.
                  </div>
                </div>
              </div>

              <!-- Link to python -->
              <script type="py" src="TeamChecker.py"></script>
            </div>
          </div>

        
        </div>
      </div>
    </div>
  </body>
</html>
